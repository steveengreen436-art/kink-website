            flood.innerHTML += `<div class="p-4 border border-zinc-900 hover:border-yellow-500 transition cursor-pointer bg-zinc-950">

                <p class="text-[10px] text-zinc-400 mt-1">Sync: Tajima/Ricoma | Torque: 99.8% | Status: STABLE</p>
            </div>`;
        }
    </script>
</body>
