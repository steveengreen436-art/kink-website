<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="p-10">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-2" id="grid"></div>
    <script>
        const grid = document.getElementById('grid');
        for(let i=0; i<60; i++) {
            grid.innerHTML += `
            <div class="h-32 border border-zinc-900 hover:border-yellow-500 p-4 transition-all group">
                <span class="text-[8px] text-yellow-500 uppercase">Protocol ${1000+i}</span>
                <p class="text-xs mt-2 font-bold opacity-70 group-hover:opacity-100">Synchronizing ${['Tajima', 'Ricoma'][i%2]} drive parameters for peak torque.</p>
            </div>`;
        }
    </script>
</body>
</html>
