<!DOCTYPE html>
<html lang="en" class="bg-[#030303] text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact KINK | Master Embroidery Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="w-full border-b border-zinc-900 p-6 flex justify-between items-center">
        <a href="index.html" class="text-3xl font-black text-yellow-500">KINK.</a>
        <div class="space-x-8 text-xs font-bold text-zinc-400">
            <a href="about.html" class="hover:text-yellow-400">ABOUT US</a>
            <a href="matrix.html" class="hover:text-yellow-400">MACHINE MASTERY MATRIX</a>
            <a href="blog.html" class="hover:text-yellow-400">BLOG</a>
        </div>
    </nav>

    <!-- CONTACT FORM SECTION -->
    <main class="max-w-2xl mx-auto py-20 px-6">
        <h1 class="text-5xl font-black mb-8">Let's Get Your Machines Running</h1>
        <p class="text-zinc-400 mb-10">Need emergency repair or a consultation for your production line? Reach out to Vusi directly.</p>
        
        <form class="space-y-6">
            <div>
                <label class="block text-sm font-bold mb-2">Name</label>
                <input type="text" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-lg focus:border-yellow-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Machine Model</label>
                <input type="text" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-lg focus:border-yellow-500 outline-none" placeholder="e.g., Tajima TMEZ-SC">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Message</label>
                <textarea rows="5" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-lg focus:border-yellow-500 outline-none"></textarea>
            </div>
            <button class="w-full bg-yellow-500 text-black font-black py-4 rounded-lg hover:bg-yellow-400">SEND REQUEST</button>
        </form>
    </main>

</body>
</html>
