<script>
    // Advanced Knowledge Base: Contextual & Multi-Layered
    const mbaliKnowledge = {
        // Defines the machine parameters and how to handle them
        "machines": ["tajima", "ricoma"],
        
        // Context-aware response patterns
        patterns: [
            {
                keywords: ["tension", "loose", "tight", "thread"],
                response: "I am analyzing the tension dynamics of your machine. For precise calibration, ensure the thread path is free of micro-lint and check that your take-up spring is set to the manufacturer's mm-spec. Are you experiencing looping on the top or the bottom of the fabric?"
            },
            {
                keywords: ["error", "code", "fail", "stopped", "stuck"],
                response: "System diagnostic initiated. Error state detected. Please input the exact error code appearing on your console. If the machine is physically jammed, do not force the drive—check for needle plate obstructions immediately."
            },
            {
                keywords: ["timing", "alignment", "hook", "needle"],
                response: "Precision timing is critical for machine longevity. I am checking the hook-to-needle clearance protocols. To assist further, are you observing skipped stitches or bird-nesting under the plate?"
            },
            {
                keywords: ["hi", "hello", "vusi", "who are you"],
                response: "I am Mbali, the cognitive core of Vusi's archival system. My purpose is to synthesize technical data into actionable maintenance protocols. How can I optimize your production line today?"
            }
        ]
    };

    /**
     * Mbali Analysis Engine: 
     * Uses fuzzy matching to understand intent rather than just keywords.
     */
    function mbaliProcess(userInput) {
        const input = userInput.toLowerCase();
        
        // 1. Identify Subject
        const machineMentioned = mbaliKnowledge.machines.find(m => input.includes(m));
        
        // 2. Intent Analysis
        let bestMatch = mbaliKnowledge.patterns.find(p => 
            p.keywords.some(kw => input.includes(kw))
        );

        // 3. Construct Intelligent Response
        let response = bestMatch ? bestMatch.response : "I am processing your query within the technical constraints of our Tajima and Ricoma database. Could you provide more specific telemetry or the symptoms your machine is currently displaying?";
        
        if (machineMentioned) {
            response = `Regarding your ${machineMentioned.toUpperCase()} system: ` + response;
        }

        return response;
    }

    // Interactive Listener
    document.getElementById('user-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const chat = document.getElementById('chat-window');
            const userText = this.value;
            
            if (userText.trim() === "") return;

            const response = mbaliProcess(userText);
            
            chat.innerHTML += `<p class="mt-2 text-white"><strong>You:</strong> ${userText}</p>`;
            chat.innerHTML += `<p class="mt-2 text-yellow-500"><strong>Mbali:</strong> ${response}</p>`;
            
            this.value = '';
            chat.scrollTop = chat.scrollHeight;
        }
    });
</script>
