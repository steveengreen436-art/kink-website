<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .bg-animate { background: linear-gradient(120deg, #000, #1a1a00, #000); background-size: 200% 200%; animation: flow 10s ease infinite; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body class="bg-animate text-white min-h-screen">
    <!-- NAV -->
    <nav class="glass sticky top-0 z-50 px-10 py-6 flex justify-between items-center">
        <div class="text-4xl font-black italic tracking-tighter">KiNk<span class="text-yellow-500">.</span></div>
        <div class="flex gap-12 text-[10px] font-bold tracking-[0.4em] text-zinc-400">
            <a href="about.html" class="hover:text-yellow-500 transition">ABOUT</a>
            <a href="matrix.html" class="hover:text-yellow-500 transition">MATRIX</a>
            <a href="blog.html" class="hover:text-yellow-500 transition">BLOG</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="py-32 text-center">
        <h1 class="text-9xl font-black italic mb-6">PREMIER<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-800">ENGINEERING</span></h1>
        <a href="contact.html" class="inline-block border border-yellow-500 px-16 py-6 font-black hover:bg-yellow-500 hover:text-black transition">EMERGENCY REPAIR</a>
    </section>

    <!-- MBALI ELITE ENGINE -->
    <section class="max-w-4xl mx-auto p-10 glass rounded-sm">
        <h3 class="text-yellow-500 font-bold mb-6 tracking-widest text-xs">MBALI_COGNITIVE_INTERFACE_V4</h3>
        <div id="chat-window" class="h-64 overflow-y-auto mb-6 text-zinc-300 font-mono text-sm leading-relaxed"></div>
        <input type="text" id="user-input" class="w-full bg-transparent border-b border-zinc-700 p-4 focus:border-yellow-500 outline-none" placeholder="Input diagnostic code or inquiry...">
    </section>

    <script>
        const mbaliLogic = (input) => {
            const i = input.toLowerCase();
            const greetings = ["hi", "hello", "hey", "greetings"];
            if (greetings.some(word => i.includes(word))) return "Mbali Core: A pleasant greeting, but I am currently calibrated for industrial diagnostics. Are you reporting a system error or a mechanical failure?";
            if (i.includes("tajima")) return "Tajima telemetry accessed. If your TMEZ-SC is stalling, verify the encoder belt tension. Is the spindle torque fluctuating?";
            if (i.includes("ricoma")) return "Ricoma protocols live. Tension drops usually stem from hook-race debris. Have you cleared the needle plate sensors?";
            return "Mbali Core: My archives contain 5,000+ repair protocols. Please specify your machine make and the observed anomaly so I can provide a precise solution.";
        };

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const chat = document.getElementById('chat-window');
                const val = this.value;
                chat.innerHTML += `<p class="text-white"><strong>User:</strong> ${val}</p>`;
                chat.innerHTML += `<p class="text-yellow-500 mb-4 italic"><strong>Mbali:</strong> ${mbaliLogic(val)}</p>`;
                this.value = '';
                chat.scrollTop = chat.scrollHeight;
            }
        });
    </script>
</body>
</html>
