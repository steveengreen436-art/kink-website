<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="py-20 px-20">
    <h1 class="text-7xl font-black mb-20">A DECADE OF<br><span class="text-yellow-500">UNDEFETATED MASTERY</span></h1>
    <div class="border-l border-zinc-800 space-y-16 pl-10" id="bio"></div>
    <script>
        const bio = document.getElementById('bio');
        for(let i=0; i<15; i++) {
            bio.innerHTML += `
            <div class="hover:pl-10 transition-all cursor-pointer">
                <div class="text-[10px] text-yellow-500">LOG_ENTRY_${2016+i}</div>
                <h3 class="text-xl font-bold">Industrial Standard Calibration</h3>
                <p class="text-zinc-500 italic">"The philosophy is simple: Timing is everything."</p>
            </div>`;
        }
    </script>
</body>
</html>
